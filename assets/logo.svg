<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" ry="40" fill="url(#bg)"/>
  <rect width="200" height="200" rx="40" ry="40" fill="url(#shine)"/>

  <!-- % symbol, large and centered -->
  <text x="100" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="110" font-weight="700" fill="white"
        text-anchor="middle" letter-spacing="-4">%</text>

  <!-- Bottom label -->
  <text x="100" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="600" fill="rgba(255,255,255,0.75)"
        text-anchor="middle" letter-spacing="1">CALC</text>
</svg>
